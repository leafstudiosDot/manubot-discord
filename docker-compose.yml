services:
  manubot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: manubot
    env_file:
      - .env
    environment:
      DB_PATH: /data/manubot.db
    ports:
      - "${API_PORT:-6540}:${API_PORT:-6540}"
    volumes:
      - ./data:/data
    restart: unless-stopped
